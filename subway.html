    html+=`<div style="margin-bottom:4px;border-radius:8px;overflow:hidden;
        box-shadow:0 1px 4px rgba(15,35,80,0.08);">
      <div style="display:flex;align-items:stretch;
          background:${col}20;border:1px solid ${col}30;border-radius:8px 8px 0 0;
          border-bottom:none;">
        <span style="background:${col};color:white;font-size:9px;font-weight:800;
          width:22px;display:flex;align-items:center;justify-content:center;
          border-radius:6px 0 0 0;flex-shrink:0;font-family:'Syne',sans-serif;">${n}</span>
        <span style="padding:7px 8px;flex:1;min-width:0;">
          <span style="display:block;font-size:10px;font-weight:700;color:${col};
            font-family:'DM Sans',sans-serif;">${lbl}</span>
          <span style="display:block;font-size:7.5px;color:rgba(15,35,80,0.45);
            margin-top:1px;font-family:'DM Mono',monospace;">${sub}</span>
        </span>
        <span style="font-size:8px;color:rgba(15,35,80,0.3);padding:0 10px;
          display:flex;align-items:center;font-family:'DM Mono',monospace;
          white-space:nowrap;">${total} tasks</span>
      </div>
      <div style="border:1px solid ${col}22;border-top:none;border-radius:0 0 8px 8px;
          background:white;padding:3px 0 4px;">
        ${groups.map((grp,gi)=>`
          <details style="margin:3px 6px 2px;">
            <summary style="cursor:pointer;list-style:none;display:flex;
                align-items:center;gap:5px;padding:3px 4px;border-radius:4px;
                background:${col}0e;user-select:none;border-bottom:1px solid ${col}15;">
              <span style="width:3px;height:12px;background:${col};
                border-radius:2px;opacity:0.7;flex-shrink:0;"></span>
              <span style="font-size:8.5px;font-weight:700;color:${col};
                letter-spacing:0.05em;font-family:'Syne',sans-serif;flex:1;">${grp.lbl}</span>
              <span style="font-size:7.5px;color:rgba(15,35,80,0.28);
                font-family:'DM Mono',monospace;">${grp.items.length}</span>
              <span class="gchev" style="font-size:9px;color:${col};opacity:0.5;
                transition:transform 0.15s;margin-left:2px;">&#9654;</span>
            </summary>
            <div style="padding:2px 0 2px;">
              ${grp.items.map((item,i)=>`
                <label style="display:flex;align-items:flex-start;gap:6px;
                    padding:3px 4px 3px 8px;border-radius:3px;cursor:pointer;
                    background:${i%2===0?'rgba(255,255,255,0.9)':'rgba(15,35,80,0.012)'};
                    margin-bottom:1px;">
                  <input type="checkbox" style="margin-top:2px;flex-shrink:0;
                    accent-color:${col};width:11px;height:11px;">
                  <span style="font-size:8.5px;color:rgba(15,35,80,0.72);
                    line-height:1.5;flex:1;">${item.t}</span>
                  <span style="font-size:6.5px;font-weight:700;color:${col};
                    background:${col}12;border:1px solid ${col}25;border-radius:3px;
                    padding:1px 4px;white-space:nowrap;flex-shrink:0;
                    letter-spacing:0.04em;align-self:flex-start;margin-top:2px;
                    font-family:'DM Mono',monospace;">${item.note}</span>
                </label>`).join('')}
            </div>
          </details>`).join('')}
      </div>
    </div>`;
  });
  body.innerHTML=html;
  body.querySelectorAll('details').forEach(d=>{
    d.addEventListener('toggle',()=>{
      const ch=d.querySelector('.gchev');
      if(ch)ch.style.transform=d.open?'rotate(90deg)':'';
    });
  });
})();
</script>
</body>
</html>
